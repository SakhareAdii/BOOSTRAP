<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sports CSS Grid</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container-fluid">
        <div class="sports-grid">
            
            <div class="content-col">
                <p class="subtitle">CRICKET | FOOTBALL | LIVE SPORTS</p>
                <h1 class="main-title">Welcome to the Stadium..!</h1>
                <p class="description">Experience the thrill of live matches under the floodlights. Book your premium stadium seats for the upcoming tournament showdown and witness sports history live right from the stands.</p>
                
                <div class="button-group">
                    <button class="btn btn-danger">Book Tickets</button>
                    <button class="btn btn-warning">View Schedule</button>
                </div>
            </div>
            
            <div class="image-col">
                <img src="/GridLayout/image/image.png" alt="sports stadium" class="img-fluid">
            </div>
            
        </div>
    </div>

</body>

</html>
