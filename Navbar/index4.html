<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabir Navbar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .navbar-custom {
            background: linear-gradient(90deg, #FFD54F, #FFC107);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .navbar-brand {
            font-size: 1.8rem;
            font-weight: bold;
            color: #222 !important;
            letter-spacing: 1px;
        }

        .nav-link {
            color: #222 !important;
            font-weight: 600;
            margin: 0 10px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #fff !important;
        }

        .btn-custom {
            background: #222;
            color: #fff;
            border-radius: 30px;
            padding: 8px 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #fff;
            color: #222;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light navbar-custom py-3">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand" href="#">
            <i class="bi bi-stars"></i> Kabir
        </a>

        <!-- Mobile Menu -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navbarMenu">

            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#"><i class="bi bi-house-fill"></i> Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#"><i class="bi bi-person-fill"></i> About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#"><i class="bi bi-grid-fill"></i> Services</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#"><i class="bi bi-image-fill"></i> Gallery</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#"><i class="bi bi-envelope-fill"></i> Contact</a>
                </li>
            </ul>

            <!-- Button -->
            <a href="#" class="btn btn-custom">
                Get Started
            </a>

        </div>
    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
