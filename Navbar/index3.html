<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Navbar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .navbar-custom{
            background: linear-gradient(90deg, #b30000, #ff3333);
            box-shadow: 0 5px 15px rgba(255,0,0,0.3);
        }

        .navbar-brand{
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff !important;
            letter-spacing: 1px;
        }

        .nav-link{
            color: #fff !important;
            font-weight: 500;
            margin: 0 10px;
            transition: 0.3s;
        }

        .nav-link:hover{
            color: #ffd700 !important;
            transform: translateY(-2px);
        }

        .btn-contact{
            background: #fff;
            color: #b30000;
            border-radius: 25px;
            padding: 8px 18px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-contact:hover{
            background: #ffd700;
            color: #000;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">

        <!-- Brand -->
        <a class="navbar-brand" href="#">
            <i class="bi bi-fire"></i> Aditya
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar Links -->
        <div class="collapse navbar-collapse" id="navbarContent">

            <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">
                        <i class="bi bi-house-door"></i> Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-person"></i> About
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-briefcase"></i> Projects
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-award"></i> Skills
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="bi bi-envelope"></i> Contact
                    </a>
                </li>
            </ul>

            <!-- Contact Button -->
            <a href="#" class="btn btn-contact">
                Hire Me
            </a>

        </div>

    </div>
</nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
